<div class="form-container">
  <header class="page-header">
    <a routerLink="/produit-list" class="btn-back">← Retour</a>
    <h1>Ajouter un produit</h1>
  </header>

  <form class="product-form">
    <div class="form-section">
      <div class="input-group">
        <label for="name">Nom du produit</label>
        <input type="text" id="name" placeholder="ex: Appareil Photo Sony">
      </div>

      <div class="row">
        <div class="input-group">
          <label for="price">Prix (€)</label>
          <input type="number" id="price" placeholder="0.00">
        </div>
        <div class="input-group">
          <label for="stock">Quantité en stock</label>
          <input type="number" id="stock" placeholder="0">
        </div>
      </div>

      <div class="input-group">
        <label for="category">Catégorie</label>
        <select id="category">
          <option value="">Sélectionner une catégorie</option>
          <option value="electronics">Électronique</option>
          <option value="home">Maison</option>
          <option value="fashion">Mode</option>
        </select>
      </div>

      <div class="input-group">
        <label for="description">Description</label>
        <textarea id="description" rows="5" placeholder="Détails du produit..."></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" routerLink="/produit-list">Annuler</button>
      <button type="submit" class="btn-submit" (click)="saveproduct()">Enregistrer le produit</button>
    </div>
  </form>
</div>
