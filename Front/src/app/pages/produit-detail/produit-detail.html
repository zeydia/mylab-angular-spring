<div class="detail-container">
  @if (produit(); as p) {
    <header class="page-header">
      <a routerLink="/produit-list" class="btn-back">← Retour à l'inventaire</a>
      <div class="actions">
        <button class="btn-edit" [routerLink]="['/produit-edit', p.id]">
          Modifier
        </button>
        <button class="btn-delete" (click)="deleteproduct()">Supprimer</button>
      </div>
    </header>

    <div class="product-layout">
      <div class="info-section">
        <!-- <span class="category">{{ p.category }}</span> -->
        <h1>{{ p.name }}</h1>
        
        <div class="status-badge" [class.in-stock]="p.quantity > 0" [class.out-of-stock]="p.quantity <= 0">
          {{ p.quantity > 0 ? 'En Stock' : 'Rupture de stock' }}
        </div>
        
        <p class="price">{{ p.price | number:'1.2-2' }} CFA</p>

        <div class="stats-grid">
          <div class="stat-card">
            <label>Quantité disponible</label>
            <strong>{{ p.quantity }} unités</strong>
          </div>
          <div class="stat-card">
            <label>Référence ID</label>
            <strong>#{{ p.id }}</strong>
          </div>
        </div>
      </div>

      <div class="description-section">
        <div class="description">
          <h3>Description</h3>
          <p>{{ p.description || 'Aucune description fournie.' }}</p>
        </div>
      </div>
    </div>
  } @else {
    <div class="loader-container">
      <span class="loader"></span>
      <p>Chargement du produit...</p>
    </div>
  }
</div>
