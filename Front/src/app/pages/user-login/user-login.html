<div class="auth-wrapper">
  <div class="login-card">
    <div class="header">
      <h2>Stock<span>Manager</span></h2>
      <h2>Se connecter</h2>
      <p>Connectez-vous pour gérer vos produits</p>
    </div>

    <form class="login-form" (ngSubmit)="onLogin()" #loginForm="ngForm">
      <div class="input-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" [(ngModel)]="username" placeholder="Nom d'utilisateur" required>
      </div>

      <div class="input-group">
        <label>Mot de passe</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.form.valid">
        Se connecter
      </button>

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }
    </form>

    <div class="footer">
      <span>Pas de compte ? <a routerLink="/register">S'inscrire</a></span>
    </div>
  </div>
</div>
